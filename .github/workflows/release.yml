name: Release

on:
  push:
    branches: ["main"]

permissions:
  contents: write
  pull-requests: write
  id-token: write
  packages: write

env:
  POETRY_VERSION: "2.1.1"
  PYTHON_DEFAULT_VERSION: "3.11"

jobs:

  # ============================================
  # Release Please
  # ============================================
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      app_release_created: ${{ steps.release.outputs.release_created }}
      app_version: ${{ steps.release.outputs.version }}
      app_tag: ${{ steps.release.outputs.tag_name }}
      chart_release_created: ${{ steps.release.outputs['chart/release-lab--release_created'] }}
      chart_version: ${{ steps.release.outputs['chart/release-lab--version'] }}
      chart_tag: ${{ steps.release.outputs['chart/release-lab--tag_name'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GH_TOKEN }}

  # ============================================
  # Build package
  # ============================================
  build:
    name: Build package
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs.app_release_created == 'true'
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.release-please.outputs.app_tag }}

      - name: 🐍 Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_DEFAULT_VERSION }}

      - name: 🛠️ Install Poetry
        uses: abatilo/actions-poetry@v4
        with:
          poetry-version: ${{ env.POETRY_VERSION }}

      - name: 📦 Install dependencies
        run: poetry install

      - name: 🧱 Build distribution
        run: poetry build

      - name: 📤 Upload build artifacts
        uses: actions/upload-artifact@v5
        with:
          name: release-files
          path: dist/*

  # ============================================
  # Publish to PyPI
  # ============================================
  publish_pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [release-please, build]
    if: needs.release-please.outputs.app_release_created == 'true'
    environment:
      name: testpypi
      url: https://test.pypi.org/p/release-lab
    #environment:
    #  name: pypi
    #  url: https://pypi.org/p/release-lab
    steps:
      - name: 📥 Download build artifacts
        uses: actions/download-artifact@v6
        with:
          name: release-files
          path: .

      - name: 📦 Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/ # for pypi test

  # ============================================
  # Publish Docker Image to GHCR
  # ============================================
  publish_docker:
    name: Publish Docker Image
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs.app_release_created == 'true'
    permissions:
      contents: read
      packages: write
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.release-please.outputs.app_tag }}

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐳 Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/goabonga/release-lab:${{ needs.release-please.outputs.app_version }}
            ghcr.io/goabonga/release-lab:latest
          labels: |
            org.opencontainers.image.source=https://github.com/goabonga/release-lab
            org.opencontainers.image.version=${{ needs.release-please.outputs.app_version }}
            org.opencontainers.image.title=release-lab
            org.opencontainers.image.description=A sandbox for testing Python project release workflows

  # ============================================
  # Deploy MkDocs
  # ============================================
  deploy_docs:
    name: Deploy MkDocs
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs.app_release_created == 'true'
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: main

      - name: 🐍 Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_DEFAULT_VERSION }}

      - name: 🛠️ Install Poetry
        uses: abatilo/actions-poetry@v4
        with:
          poetry-version: ${{ env.POETRY_VERSION }}

      - name: 📦 Install dependencies
        run: poetry install --with dev

      - name: 🔑 Import GPG key
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: 🔓 Unlock GPG key
        run: |
          echo "test" | gpg --batch --yes --passphrase "$GPG_PASSPHRASE" --pinentry-mode loopback -s >/dev/null
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: 🔧 Configure Git user
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.signingkey "$(gpg --list-secret-keys --keyid-format=LONG | grep sec | awk '{print $2}' | cut -d/ -f2)"
          git config --global commit.gpgsign true

      - name: 🏗️ Build docs with MkDocs
        run: poetry run mkdocs build
        env:
          DOC_VERSION: ${{ needs.release-please.outputs.app_version }}

      - name: 📂 Prepare gh-pages branch
        run: |
          GH_REPO_URL="https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/${{ github.repository }}.git"
          if git ls-remote --exit-code --heads "$GH_REPO_URL" gh-pages > /dev/null 2>&1; then
            git clone --depth=1 --branch gh-pages "$GH_REPO_URL" gh-pages
            rm -rf gh-pages/*
          else
            mkdir gh-pages
            cd gh-pages
            git init
            git checkout --orphan gh-pages
          fi

      - name: 📄 Copy docs
        run: |
          cp -r site/* gh-pages/
          touch gh-pages/.nojekyll

      - name: ✅ Commit & push signed docs
        run: |
          GH_REPO_URL="https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/${{ github.repository }}.git"
          cd gh-pages
          git add .
          git commit -S -m "docs: publish docs for v${{ needs.release-please.outputs.app_version }}"
          git remote remove origin 2>/dev/null || true
          git remote add origin "$GH_REPO_URL"
          git push origin gh-pages

  # ============================================
  # Publish Helm Chart to GHCR (OCI)
  # ============================================
  publish_helm:
    name: Publish Helm Chart
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs.chart_release_created == 'true'
    permissions:
      contents: read
      packages: write
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.release-please.outputs.chart_tag }}

      - name: 🔧 Install Helm
        uses: azure/setup-helm@v4

      - name: 🔑 Login to GHCR for Helm
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: 📦 Get app version
        id: app_version
        run: |
          VERSION=$(grep '^version = ' pyproject.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: 📦 Package Helm chart
        run: helm package --app-version ${{ steps.app_version.outputs.version }} chart/release-lab

      - name: 📤 Push Helm chart to GHCR
        run: helm push release-lab-*.tgz oci://ghcr.io/goabonga/release-lab-chart
