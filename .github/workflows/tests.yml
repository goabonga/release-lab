name: Pull Request Test & Lint

on:
  pull_request:

permissions:
  pull-requests: write

env:
  POETRY_VERSION: "2.1.1"

jobs:
  test:
    name: Test and Lint (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v5

      - name: 🐍 Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: 🛠️ Install Poetry
        uses: abatilo/actions-poetry@v4
        with:
          poetry-version: ${{ env.POETRY_VERSION }}

      - name: 📦 Install dependencies
        run: poetry install --with dev

      - name: 📝 Init summary file
        run: |
          echo "<!-- lint-summary-py${{ matrix.python-version }} -->" > lint_summary.md
          echo "## 🧪 Linting Summary for Python ${{ matrix.python-version }}" >> lint_summary.md

      - name: 📜 Check SPDX license headers
        id: spdx_check
        continue-on-error: true
        run: |
          if ! poetry run python ./scripts/add_license_header.py --path src --types py --check > spdx_output.txt 2>&1; then
            echo "### ❌ SPDX headers check failed (src)" >> lint_summary.md
            echo "\`\`\`" >> lint_summary.md
            cat spdx_output.txt >> lint_summary.md
            echo "\`\`\`" >> lint_summary.md
            echo "SPDX_FAILED=true" >> $GITHUB_ENV
          fi

          if ! poetry run python ./scripts/add_license_header.py --path tests --types py --check > spdx_output_tests.txt 2>&1; then
            echo "### ❌ SPDX headers check failed (tests)" >> lint_summary.md
            echo "\`\`\`" >> lint_summary.md
            cat spdx_output_tests.txt >> lint_summary.md
            echo "\`\`\`" >> lint_summary.md
            echo "SPDX_FAILED=true" >> $GITHUB_ENV
          fi

      - name: 🧹 Check import sorting with isort
        id: isort_check
        continue-on-error: true
        run: |
          if ! poetry run isort . --check-only --diff > isort_output.txt; then
            echo "### ❌ isort failed" >> lint_summary.md
            echo "\`\`\`" >> lint_summary.md
            cat isort_output.txt >> lint_summary.md
            echo "\`\`\`" >> lint_summary.md
            echo "ISORT_FAILED=true" >> $GITHUB_ENV
          fi

      - name: 🐶 Check lint with ruff
        id: ruff_check
        continue-on-error: true
        run: |
          if ! poetry run ruff check . > ruff_output.txt; then
            echo "### ❌ ruff failed" >> lint_summary.md
            echo "\`\`\`" >> lint_summary.md
            cat ruff_output.txt >> lint_summary.md
            echo "\`\`\`" >> lint_summary.md
            echo "RUFF_FAILED=true" >> $GITHUB_ENV
          fi

      - name: 🔎 Type check with MyPy
        id: mypy_check
        continue-on-error: true
        run: |
          if ! poetry run mypy src/ tests/ > mypy_output.txt; then
            echo "### ❌ mypy failed" >> lint_summary.md
            echo "\`\`\`" >> lint_summary.md
            cat mypy_output.txt >> lint_summary.md
            echo "\`\`\`" >> lint_summary.md
            echo "MYPY_FAILED=true" >> $GITHUB_ENV
          fi

      - name: 📝 Mark as resolved if all checks passed
        if: env.SPDX_FAILED != 'true' && env.ISORT_FAILED != 'true' && env.RUFF_FAILED != 'true' && env.MYPY_FAILED != 'true'
        run: |
          echo "<!-- lint-summary-py${{ matrix.python-version }} -->" > lint_summary.md
          echo "## 🧪 Linting Summary for Python ${{ matrix.python-version }}" >> lint_summary.md
          echo "### ✅ All checks passed" >> lint_summary.md

      - name: 💬 Comment lint results
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          body-includes: "<!-- lint-summary-py${{ matrix.python-version }} -->"
          body-path: lint_summary.md

      - name: 🧪 Run tests
        id: run_tests
        continue-on-error: true
        run: poetry run pytest --cov

      - name: 📤 Upload coverage reports to Codecov
        if: matrix.python-version == '3.13' && steps.run_tests.outcome == 'success'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: goabonga/release-lab

      - name: 📤 Upload test results to Codecov
        if: matrix.python-version == '3.13' && steps.run_tests.outcome == 'success'
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: 📊 Save test results
        if: always()
        run: |
          echo "$( [ "$SPDX_FAILED" = "true" ] && echo fail || echo pass )|📜 Check SPDX license headers" > test-result.txt
          echo "$( [ "$ISORT_FAILED" = "true" ] && echo fail || echo pass )|🧹 Check import sorting with isort" >> test-result.txt
          echo "$( [ "$RUFF_FAILED" = "true" ] && echo fail || echo pass )|🐶 Check lint with ruff" >> test-result.txt
          echo "$( [ "$MYPY_FAILED" = "true" ] && echo fail || echo pass )|🔎 Type check with MyPy" >> test-result.txt
          echo "$( [ "${{ steps.run_tests.outcome }}" = "success" ] && echo pass || echo fail )|🧪 Run tests" >> test-result.txt

      - name: 📤 Upload test result artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-result-py${{ matrix.python-version }}
          path: test-result.txt

      - name: ❌ Fail if checks failed
        if: env.SPDX_FAILED == 'true' || env.ISORT_FAILED == 'true' || env.RUFF_FAILED == 'true' || env.MYPY_FAILED == 'true' || steps.run_tests.outcome == 'failure'
        run: exit 1

  test-plan:
    name: Update PR Test Plan
    needs: test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Download all test results
        uses: actions/download-artifact@v4
        with:
          pattern: test-result-py*

      - name: 📝 Update PR test plan
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          {
            echo "<!-- test-plan -->"
            echo "## Test Plan"
            for version in "3.10" "3.11" "3.12" "3.13"; do
              dir="test-result-py${version}"
              if [ -d "$dir" ]; then
                while IFS='|' read -r result label; do
                  if [ "$result" = "pass" ]; then
                    echo "- [x] ${label} on Python ${version}"
                  else
                    echo "- [ ] ${label} on Python ${version}"
                  fi
                done < "${dir}/test-result.txt"
              fi
            done
          } > test-plan.md

          PR_NUMBER=${{ github.event.pull_request.number }}
          CURRENT_BODY=$(gh pr view "$PR_NUMBER" --repo ${{ github.repository }} --json body -q .body)
          printf '%s' "$CURRENT_BODY" > current-body.md

          if grep -q "<!-- test-plan -->" current-body.md; then
            sed -i '/<!-- test-plan -->/,/<!-- test-plan-end -->/d' current-body.md
          fi

          {
            cat current-body.md
            echo ""
            cat test-plan.md
            echo "<!-- test-plan-end -->"
          } > new-body.md

          gh pr edit "$PR_NUMBER" --repo ${{ github.repository }} --body-file new-body.md
